# vsftpd configuration file

# Disable anonymous access
anonymous_enable=NO

# Disable local user access
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
# Enable userlist functionality to allow specific user access
userlist_enable=YES

# Do not deny access to users in the userlist file
userlist_deny=NO

# Specify the file containing the allowed users
userlist_file=/etc/vsftpd.allowed_users

# Enable chroot jail for local users
chroot_local_user=YES

# Enable logging
xferlog_enable=YES

allow_writeable_chroot=YES

connect_from_port_20=YES

# Use the standard log format
xferlog_std_format=YES

# Restrict users to their home directory and subfolders
local_root=/home/ftpuser
